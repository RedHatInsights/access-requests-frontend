apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/RedHatInsights/access-requests-frontend?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "pull_request" && target_branch
      == "master"
    pipelinesascode.tekton.dev/pipeline: https://raw.githubusercontent.com/catastrophe-brandon/konflux-pipelines/refs/heads/btweed/v2-default-playwright-image/pipelines/platform-ui/docker-build-run-all-tests.yaml
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: access-requests-frontend
    appstudio.openshift.io/component: access-requests-frontend
    pipelines.appstudio.openshift.io/type: build
  name: access-requests-frontend-on-pull-request
  namespace: rh-platform-experien-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/rh-platform-experien-tenant/access-requests-frontend/access-requests-frontend:on-pr-{{revision}}
  - name: image-expires-after
    value: 5d
  - name: dockerfile
    value: build-tools/Dockerfile
  - name: path-context
    value: .
  - name: rebuild
    value: "true"
  - name: e2e-app-port
    value: "8000"
  - name: e2e-playwright-image
    value: mcr.microsoft.com/playwright:v1.40.0-noble
  - name: workspace-setup-script
    value: |
      #!/bin/bash
      set -ex

      npm install
      # Install Playwright browsers
      npx playwright install chromium
  - name: unit-tests-script
    value: |
      #!/bin/bash
      set -ex

      npm run lint
      npm test -- --runInBand --no-cache
  - name: run-app-script
    value: |
      #!/bin/sh
      # Script that runs the test application with Caddy using ConfigMap-mounted Caddyfile

      set -e

      echo "Starting application with Caddy using ConfigMap Caddyfile..."
      exec caddy run --config /etc/caddy/Caddyfile
  - name: e2e-tests-script
    value: |
      #!/bin/bash
      set -ex

      # Wait for application to be ready
      echo "Waiting for application server to be ready..."
      timeout 120s bash -c 'until curl -k https://stage.foo.redhat.com:1337 > /dev/null 2>&1; do
        echo "Waiting for dev server to be ready"
        sleep 5
      done'
      echo "Dev server ready!"

      # Set Vault address for tests
      export VAULT_ADDR=https://vault.devshift.net

      # Check if Vault token is available (from secret)
      if [ -z "$VAULT_TOKEN" ]; then
        echo "WARNING: VAULT_TOKEN not set - E2E tests requiring Vault will be skipped"
        echo "To enable Vault-based tests, add VAULT_TOKEN to the credentials secret"
        exit 0
      fi

      # Verify Vault access
      echo "Verifying Vault access..."
      if ! vault kv get insights/secrets/qe/stage/users/idp_internal_user > /dev/null 2>&1; then
        echo "WARNING: Cannot access Vault secret - E2E tests will be skipped"
        echo "Vault token may be expired or insufficient permissions"
        exit 0
      fi

      echo "Running Playwright E2E tests..."
      npx playwright test
  - name: e2e-credentials-secret
    value: access-requests-frontend-credentials-secret
  - name: frontend-proxy-routes-configmap
    value: access-requests-frontend-dev-proxy-caddyfile-v2
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/catastrophe-brandon/konflux-pipelines
    - name: revision
      value: btweed/v2-default-playwright-image
    - name: pathInRepo
      value: pipelines/platform-ui/docker-build-run-all-tests.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-access-requests-frontend
  taskRunSpecs:
    - pipelineTaskName: run-e2e-tests
      serviceAccountName: build-pipeline-access-requests-frontend
      podTemplate:
        # Override /etc/hosts to redirect stage.foo.redhat.com to localhost
        hostAliases:
          - ip: "::1"
            hostnames:
              - "stage.foo.redhat.com"
          - ip: "127.0.0.1"
            hostnames:
              - "stage.foo.redhat.com"
  workspaces:
  - name: workspace
    volumeClaimTemplate:
      metadata:
        creationTimestamp: null
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 3Gi
      status: {}
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
